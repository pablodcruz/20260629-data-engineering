services:
  airflow:
    # Pin the image so the DAG and CLI behave the same for every learner.
    image: apache/airflow:2.9.3
    container_name: streamflow_lab07_airflow
    init: true
    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      # AIRFLOW_PORT allows a conflict-free override such as 8081:8080.
      - "${AIRFLOW_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # This manually triggered teaching DAG should be immediately available.
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
    healthcheck:
      # standalone starts several processes; the scheduler check confirms more
      # than merely having a container process or an open web port.
      test:
        - CMD-SHELL
        - airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s
    command: standalone
